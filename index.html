<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PDF 병합">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>PDF 이미지 병합</title>
<script src="vendor/pdf.min.js"></script>
<script src="vendor/pdf-lib.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', -apple-system, sans-serif; background:#0f1117; color:#e1e4e8;
  min-height:100vh; padding-bottom:calc(64px + env(safe-area-inset-bottom));
  -webkit-tap-highlight-color:transparent;
}

.app { max-width:1400px; margin:0 auto; padding:calc(16px + env(safe-area-inset-top)) 20px 20px; }
h1 { text-align:center; font-size:1.8rem; margin-bottom:6px; color:#fff; }
.subtitle { text-align:center; color:#8b949e; margin-bottom:24px; font-size:0.9rem; }

/* Drop Zone */
.drop-zone {
  border:2px dashed #30363d; border-radius:12px; padding:48px 24px;
  text-align:center; transition:all .2s; cursor:pointer; margin-bottom:20px;
  background:#161b22;
}
.drop-zone:hover, .drop-zone.dragover { border-color:#58a6ff; background:#1c2333; }
.drop-zone-icon { font-size:3rem; margin-bottom:12px; }
.drop-zone p { color:#8b949e; }
.drop-zone p strong { color:#58a6ff; }
input[type=file] { display:none; }

/* Toolbar */
.toolbar {
  display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; align-items:center;
}
.toolbar-left { display:flex; gap:10px; flex-wrap:wrap; flex:1; }
.btn {
  min-height:38px; padding:8px 16px; border:1px solid #30363d; border-radius:8px; background:#21262d;
  color:#e1e4e8; cursor:pointer; font-size:.85rem; transition:all .15s; display:flex;
  align-items:center; gap:6px; white-space:nowrap;
}
.btn:hover { background:#30363d; border-color:#58a6ff; }
.btn.primary { background:#238636; border-color:#2ea043; color:#fff; font-weight:600; }
.btn.primary:hover { background:#2ea043; }
.btn.danger { border-color:#f85149; color:#f85149; }
.btn.danger:hover { background:#f8514922; }
.btn:disabled { opacity:.4; cursor:not-allowed; }

/* PDF List */
.pdf-list { display:flex; flex-direction:column; gap:12px; margin-bottom:20px; }

.pdf-card {
  background:#161b22; border:1px solid #30363d; border-radius:10px; overflow:hidden;
  transition:all .2s;
}
.pdf-card.dragging { opacity:.5; border-color:#58a6ff; }
.pdf-card.drag-over-top { border-top:3px solid #58a6ff; }
.pdf-card.drag-over-bottom { border-bottom:3px solid #58a6ff; }

.pdf-header {
  display:flex; align-items:center; padding:12px 16px; gap:12px; cursor:grab;
  background:#1c2128; border-bottom:1px solid #30363d; user-select:none;
}
.pdf-header:active { cursor:grabbing; }
.drag-handle { color:#484f58; font-size:1.2rem; flex-shrink:0; }
.pdf-info { flex:1; min-width:0; }
.pdf-name { font-weight:600; font-size:.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pdf-meta { color:#8b949e; font-size:.8rem; margin-top:2px; }
.pdf-actions { display:flex; gap:6px; align-items:center; }
.pdf-actions .btn { padding:4px 10px; font-size:.78rem; }

.order-arrows { display:flex; flex-direction:column; gap:2px; margin-right:4px; }
.arrow-btn {
  width:28px; height:22px; border:1px solid #30363d; border-radius:4px; background:#21262d;
  color:#8b949e; cursor:pointer; font-size:.75rem; display:flex; align-items:center;
  justify-content:center; transition:all .15s; padding:0; line-height:1;
}
.arrow-btn:hover { background:#30363d; border-color:#58a6ff; color:#58a6ff; }
.arrow-btn:disabled { opacity:.25; cursor:not-allowed; }
.arrow-btn:disabled:hover { background:#21262d; border-color:#30363d; color:#8b949e; }

.pdf-order-num {
  background:#30363d; color:#8b949e; font-size:.7rem; font-weight:700;
  width:24px; height:24px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; flex-shrink:0;
}

.toggle-pages {
  background:none; border:none; color:#58a6ff; cursor:pointer; font-size:.8rem;
  padding:4px 8px; border-radius:4px;
}
.toggle-pages:hover { background:#58a6ff22; }

/* Page Grid */
.pages-container { padding:12px 16px; display:none; }
.pages-container.open { display:block; }

.page-controls {
  display:flex; gap:8px; margin-bottom:10px; align-items:center; flex-wrap:wrap;
}
.page-controls .btn { padding:3px 10px; font-size:.76rem; }
.page-range-input {
  background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#e1e4e8;
  padding:4px 8px; font-size:.78rem; width:160px;
}
.page-range-input::placeholder { color:#484f58; }

.pages-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(100px, 1fr));
  gap:8px; max-height:400px; overflow-y:auto; padding:4px;
}
.pages-grid::-webkit-scrollbar { width:6px; }
.pages-grid::-webkit-scrollbar-thumb { background:#30363d; border-radius:3px; }

.page-thumb {
  position:relative; border:2px solid #30363d; border-radius:6px; overflow:hidden;
  cursor:pointer; transition:all .15s; aspect-ratio:0.707; background:#1c2128;
}
.page-thumb:hover { border-color:#58a6ff; transform:translateY(-1px); }
.page-thumb.selected { border-color:#58a6ff; box-shadow:0 0 0 1px #58a6ff; }
.page-thumb.selected::after {
  content:'✓'; position:absolute; top:4px; right:4px; width:20px; height:20px;
  background:#58a6ff; color:#fff; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:.7rem; font-weight:700;
}
.page-thumb canvas { width:100%; height:100%; object-fit:contain; display:block; }
.page-num {
  position:absolute; bottom:0; left:0; right:0; background:#000000cc; color:#e1e4e8;
  text-align:center; font-size:.7rem; padding:2px 0;
}
.page-thumb.page-dragging { opacity:.5; }
.page-thumb.page-drag-left { box-shadow: -3px 0 0 #58a6ff; }
.page-thumb.page-drag-right { box-shadow: 3px 0 0 #58a6ff; }

/* Status Bar */
.status-bar {
  position:fixed; bottom:0; left:0; right:0; background:#1c2128; border-top:1px solid #30363d;
  padding:10px 20px calc(10px + env(safe-area-inset-bottom)); display:flex; justify-content:space-between; align-items:center; z-index:100;
}
.status-info { color:#8b949e; font-size:.85rem; }
.status-info span { color:#58a6ff; font-weight:600; }

/* Progress overlay */
.overlay {
  display:none; position:fixed; inset:0; background:#000000cc; z-index:200;
  align-items:center; justify-content:center; flex-direction:column;
}
.overlay.show { display:flex; }
.progress-bar { width:300px; height:6px; background:#30363d; border-radius:3px; overflow:hidden; margin-top:16px; }
.progress-fill { height:100%; background:#58a6ff; width:0%; transition:width .3s; border-radius:3px; }
.overlay-text { color:#fff; font-size:1.1rem; }

/* Empty state */
.empty-state { text-align:center; padding:60px 20px; color:#484f58; }
.empty-state p { font-size:1.1rem; }

/* Range select highlight */
.page-thumb.range-selecting { border-color:#f0883e; background:#f0883e22; }

/* Toast */
.toast {
  position:fixed; bottom:70px; right:20px; background:#2ea043; color:#fff;
  padding:10px 20px; border-radius:8px; font-size:.85rem; z-index:300;
  transform:translateY(20px); opacity:0; transition:all .3s; pointer-events:none;
}
.toast.show { transform:translateY(0); opacity:1; }

/* Filename modal */
.filename-modal {
  display:none; position:fixed; inset:0; z-index:260; background:#000000aa;
  align-items:center; justify-content:center; padding:20px;
}
.filename-modal.show { display:flex; }
.filename-dialog {
  width:min(420px, 100%); background:#161b22; border:1px solid #30363d;
  border-radius:10px; padding:18px; box-shadow:0 20px 60px #00000066;
}
.filename-dialog h2 { font-size:1rem; margin-bottom:12px; color:#fff; }
.filename-dialog label { display:block; color:#8b949e; font-size:.8rem; margin-bottom:6px; }
.filename-input {
  width:100%; min-height:42px; background:#0d1117; border:1px solid #30363d;
  border-radius:8px; color:#e1e4e8; padding:9px 11px; font-size:.95rem;
}
.filename-input:focus { outline:none; border-color:#58a6ff; box-shadow:0 0 0 2px #58a6ff33; }
.filename-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:14px; }
.filename-actions .btn { justify-content:center; }

/* Copyright */
.copyright {
  text-align:center; color:#484f58; font-size:.7rem; padding:16px 0 40px; letter-spacing:.3px;
}

/* Responsive */
@media(max-width:768px) {
  .pages-grid { grid-template-columns:repeat(auto-fill, minmax(70px, 1fr)); }
  .app { padding-left:12px; padding-right:12px; }
  h1 { font-size:1.35rem; }
  .subtitle { font-size:.82rem; margin-bottom:14px; }
  .drop-zone { padding:28px 16px; margin-bottom:14px; }
  .drop-zone-icon { font-size:2.2rem; }
  .toolbar { gap:8px; margin-bottom:14px; }
  .toolbar-left { width:100%; overflow-x:auto; flex-wrap:nowrap; padding-bottom:2px; }
  .toolbar > .primary { width:100%; justify-content:center; }
  .pdf-header { padding:10px; gap:8px; align-items:flex-start; }
  .drag-handle { display:none; }
  .pdf-actions { flex-wrap:wrap; justify-content:flex-end; }
  .pdf-actions .btn { min-height:34px; padding:4px 8px; }
  .toggle-pages { padding:6px 4px; }
  .page-controls { overflow-x:auto; flex-wrap:nowrap; padding-bottom:2px; }
  .page-range-input { min-width:140px; }
  .status-bar { align-items:flex-start; flex-direction:column; gap:3px; padding-left:12px; padding-right:12px; }
  .filename-dialog { padding:16px; }
  .filename-actions { flex-direction:column-reverse; }
  .filename-actions .btn { width:100%; }
}
</style>
</head>
<body>

<div class="app">
  <h1>📄 PDF 이미지 병합</h1>
  <p class="subtitle">PDF와 이미지 파일을 드래그하여 추가하고, 페이지를 선택/재배치하여 하나의 PDF로 합치세요</p>

  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-icon">📁</div>
    <p><strong>PDF 또는 이미지 파일을 여기에 드래그</strong>하거나 클릭하여 선택하세요</p>
    <p style="margin-top:8px; font-size:.8rem;">여러 파일 동시 추가 가능 · PNG/JPG/WebP/GIF/BMP 지원</p>
  </div>
  <input type="file" id="fileInput" accept=".pdf,image/*" multiple>

  <div class="toolbar" id="toolbar" style="display:none;">
    <div class="toolbar-left">
      <button class="btn" onclick="selectAllPages()" title="모든 파일의 모든 페이지 선택">☑ 전체 선택</button>
      <button class="btn" onclick="deselectAllPages()" title="모든 선택 해제">☐ 전체 해제</button>
      <button class="btn" onclick="invertSelection()" title="선택 반전">🔄 선택 반전</button>
      <button class="btn" onclick="selectOddPages()">홀수 페이지</button>
      <button class="btn" onclick="selectEvenPages()">짝수 페이지</button>
      <button class="btn danger" onclick="removeUnselected()" title="선택되지 않은 페이지가 있는 파일 정리">🗑 미선택 제거</button>
      <button class="btn danger" onclick="clearAll()">✕ 전체 초기화</button>
    </div>
    <button class="btn primary" onclick="mergePDFs()" id="mergeBtn">📥 PDF 합치기 & 다운로드</button>
  </div>

  <div class="pdf-list" id="pdfList"></div>
  <div class="empty-state" id="emptyState">
    <p>아직 추가된 파일이 없습니다</p>
  </div>
</div>

<div class="copyright">© Jihun Ryu · apobi812@gmail.com</div>

<div class="status-bar" id="statusBar" style="display:none;">
  <div class="status-info">
    파일: <span id="totalFiles">0</span>개 &nbsp;|&nbsp;
    선택된 페이지: <span id="selectedPages">0</span> / <span id="totalPages">0</span>
  </div>
  <div class="status-info">
    예상 결과: <span id="resultPages">0</span> 페이지
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-text" id="overlayText">PDF 처리 중...</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="filename-modal" id="filenameModal" aria-hidden="true">
  <form class="filename-dialog" onsubmit="event.preventDefault();confirmFileName();">
    <h2>저장할 파일명</h2>
    <label for="outputFileNameInput">PDF 파일명</label>
    <input class="filename-input" id="outputFileNameInput" type="text" inputmode="text" autocomplete="off" autocapitalize="off" spellcheck="false">
    <div class="filename-actions">
      <button class="btn" type="button" onclick="cancelFileName()">취소</button>
      <button class="btn primary" type="submit">저장</button>
    </div>
  </form>
</div>

<div class="toast" id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'vendor/pdf.worker.min.js';

const state = {
  pdfs: [], // { id, type, name, size, data(Uint8Array), pageCount, selectedPages:Set, pageOrder:[] }
};

let dragSrcCardIdx = null;
let pageDragSrc = null; // { pdfIdx, pageIdx }
let filenameResolver = null;

// === Drop Zone ===
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => handleFiles(e.target.files));

async function handleFiles(files) {
  const acceptedFiles = [...files].filter(isSupportedFile);
  if (!acceptedFiles.length) { showToast('PDF 또는 이미지 파일만 추가할 수 있습니다', '#f85149'); return; }

  showOverlay('파일 로딩 중...');
  let added = 0;
  let failed = 0;
  for (let i = 0; i < acceptedFiles.length; i++) {
    setProgress((i / acceptedFiles.length) * 100);
    try {
      if (isPDFFile(acceptedFiles[i])) await addPDF(acceptedFiles[i]);
      else await addImage(acceptedFiles[i]);
      added++;
    } catch(err) {
      failed++;
      console.error(`파일 추가 실패: ${acceptedFiles[i].name}`, err);
    }
  }
  setProgress(100);
  hideOverlay();
  renderAll();
  if (added && failed) showToast(`${added}개 추가됨 · ${failed}개 실패`, '#f0883e');
  else if (added) showToast(`${added}개 파일이 추가되었습니다`);
  else showToast('파일을 추가하지 못했습니다', '#f85149');
}

async function addPDF(file) {
  const data = new Uint8Array(await file.arrayBuffer());
  const pdf = await pdfjsLib.getDocument({ data: data.slice() }).promise;
  const pageCount = pdf.numPages;
  const selectedPages = new Set();
  for (let i = 1; i <= pageCount; i++) selectedPages.add(i);

  state.pdfs.push({
    id: Date.now() + Math.random(),
    type: 'pdf',
    name: file.name,
    size: file.size,
    data: data,
    pageCount,
    selectedPages,
    pageOrder: Array.from({ length: pageCount }, (_, i) => i + 1),
    pdfDoc: pdf,
    expanded: state.pdfs.length === 0, // 첫 번째는 자동 확장
  });
}

async function addImage(file) {
  const originalData = new Uint8Array(await file.arrayBuffer());
  const previewUrl = await readFileAsDataURL(file);
  const imageInfo = await loadImageInfo(previewUrl);
  const isJpg = file.type === 'image/jpeg' || /\.(jpe?g)$/i.test(file.name);
  const isPng = file.type === 'image/png' || /\.png$/i.test(file.name);
  const imageData = isJpg || isPng ? originalData : await convertImageToPngBytes(previewUrl);

  state.pdfs.push({
    id: Date.now() + Math.random(),
    type: 'image',
    name: file.name,
    size: file.size,
    data: originalData,
    pageCount: 1,
    selectedPages: new Set([1]),
    pageOrder: [1],
    imageData,
    imageKind: isJpg ? 'jpg' : 'png',
    imageWidth: imageInfo.width,
    imageHeight: imageInfo.height,
    previewUrl,
    expanded: state.pdfs.length === 0,
  });
}

// === Render ===
function renderAll() {
  const list = document.getElementById('pdfList');
  const empty = document.getElementById('emptyState');
  const toolbar = document.getElementById('toolbar');
  const statusBar = document.getElementById('statusBar');

  if (!state.pdfs.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    toolbar.style.display = 'none';
    statusBar.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  toolbar.style.display = 'flex';
  statusBar.style.display = 'flex';

  list.innerHTML = state.pdfs.map((pdf, idx) => `
    <div class="pdf-card" data-idx="${idx}" draggable="true">
      <div class="pdf-header">
        <div class="order-arrows">
          <button class="arrow-btn" onclick="event.stopPropagation();movePDF(${idx},-1)" ${idx===0?'disabled':''} title="위로 이동">▲</button>
          <button class="arrow-btn" onclick="event.stopPropagation();movePDF(${idx},1)" ${idx===state.pdfs.length-1?'disabled':''} title="아래로 이동">▼</button>
        </div>
        <div class="pdf-order-num">${idx+1}</div>
        <span class="drag-handle">⠿</span>
        <div class="pdf-info">
          <div class="pdf-name">${escHtml(pdf.name)}</div>
          <div class="pdf-meta">
            ${pdf.type === 'image' ? '이미지 1페이지' : `${pdf.pageCount}페이지`} · ${formatSize(pdf.size)} · 선택: ${pdf.selectedPages.size}/${pdf.pageCount}
          </div>
        </div>
        <div class="pdf-actions">
          <button class="toggle-pages" onclick="toggleExpand(${idx})">
            ${pdf.expanded ? '▲ 페이지 숨기기' : '▼ 페이지 보기'}
          </button>
          <button class="btn" onclick="duplicatePDF(${idx})" title="이 파일을 복제">📋</button>
          <button class="btn" onclick="selectAllInPDF(${idx})" title="이 파일 전체 선택">☑</button>
          <button class="btn danger" onclick="removePDF(${idx})" title="이 파일 제거">✕</button>
        </div>
      </div>
      <div class="pages-container ${pdf.expanded ? 'open' : ''}" id="pages-${idx}">
        <div class="page-controls">
          <button class="btn" onclick="selectAllInPDF(${idx})">전체선택</button>
          <button class="btn" onclick="deselectAllInPDF(${idx})">전체해제</button>
          <button class="btn" onclick="invertInPDF(${idx})">반전</button>
          <button class="btn" onclick="reversePageOrder(${idx})">↕ 순서 뒤집기</button>
          <input class="page-range-input" placeholder="예: 1-5, 8, 10-12" onkeydown="if(event.key==='Enter')applyRange(${idx},this.value)" title="범위 입력 후 Enter">
          <button class="btn" onclick="applyRange(${idx}, this.previousElementSibling.value)">적용</button>
        </div>
        <div class="pages-grid" id="grid-${idx}"></div>
      </div>
    </div>
  `).join('');

  // Render thumbnails & attach card drag
  state.pdfs.forEach((pdf, idx) => {
    if (pdf.expanded) renderThumbnails(idx);
    setupCardDrag(idx);
  });

  updateStatus();
}

async function renderThumbnails(pdfIdx) {
  const pdf = state.pdfs[pdfIdx];
  const grid = document.getElementById(`grid-${pdfIdx}`);
  if (!grid) return;

  grid.innerHTML = '';
  let rangeStart = null;

  for (const pageNum of pdf.pageOrder) {
    const div = document.createElement('div');
    div.className = 'page-thumb' + (pdf.selectedPages.has(pageNum) ? ' selected' : '');
    div.dataset.page = pageNum;
    div.draggable = true;
    div.innerHTML = `<canvas></canvas><div class="page-num">${pageNum}</div>`;

    // Click: toggle select
    div.addEventListener('click', e => {
      if (e.shiftKey && grid._lastClicked != null) {
        // Shift+click: range select
        const pages = pdf.pageOrder;
        const lastIdx = pages.indexOf(grid._lastClicked);
        const curIdx = pages.indexOf(pageNum);
        const [from, to] = [Math.min(lastIdx, curIdx), Math.max(lastIdx, curIdx)];
        for (let i = from; i <= to; i++) {
          pdf.selectedPages.add(pages[i]);
        }
      } else if (e.ctrlKey || e.metaKey) {
        // Ctrl+click: toggle single
        if (pdf.selectedPages.has(pageNum)) pdf.selectedPages.delete(pageNum);
        else pdf.selectedPages.add(pageNum);
      } else {
        // Normal click: toggle single
        if (pdf.selectedPages.has(pageNum)) pdf.selectedPages.delete(pageNum);
        else pdf.selectedPages.add(pageNum);
      }
      grid._lastClicked = pageNum;
      renderAll();
    });

    // Page drag for reorder
    div.addEventListener('dragstart', e => {
      e.stopPropagation();
      pageDragSrc = { pdfIdx, pageNum };
      div.classList.add('page-dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', `page-${pdfIdx}-${pageNum}`);
    });
    div.addEventListener('dragend', e => {
      div.classList.remove('page-dragging');
      document.querySelectorAll('.page-drag-left,.page-drag-right').forEach(el => el.classList.remove('page-drag-left', 'page-drag-right'));
      pageDragSrc = null;
    });
    div.addEventListener('dragover', e => {
      if (!pageDragSrc || pageDragSrc.pdfIdx !== pdfIdx) return;
      e.preventDefault();
      e.stopPropagation();
      const rect = div.getBoundingClientRect();
      const mid = rect.left + rect.width / 2;
      div.classList.toggle('page-drag-left', e.clientX < mid);
      div.classList.toggle('page-drag-right', e.clientX >= mid);
    });
    div.addEventListener('dragleave', e => {
      div.classList.remove('page-drag-left', 'page-drag-right');
    });
    div.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      if (!pageDragSrc || pageDragSrc.pdfIdx !== pdfIdx) return;
      const srcPage = pageDragSrc.pageNum;
      const targetPage = pageNum;
      if (srcPage === targetPage) return;
      const order = pdf.pageOrder;
      const srcIdx = order.indexOf(srcPage);
      order.splice(srcIdx, 1);
      const rect = div.getBoundingClientRect();
      const mid = rect.left + rect.width / 2;
      let targetIdx = order.indexOf(targetPage);
      if (e.clientX >= mid) targetIdx++;
      order.splice(targetIdx, 0, srcPage);
      renderAll();
    });

    grid.appendChild(div);

    // Render canvas thumbnail
    try {
      const canvas = div.querySelector('canvas');
      if (pdf.type === 'image') {
        await renderImageThumbnail(pdf, canvas);
      } else {
        const page = await pdf.pdfDoc.getPage(pageNum);
        const vp = page.getViewport({ scale: 0.3 });
        canvas.width = vp.width;
        canvas.height = vp.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      }
    } catch(e) {}
  }
}

// === Card Drag (reorder PDFs) ===
function setupCardDrag(idx) {
  const card = document.querySelector(`.pdf-card[data-idx="${idx}"]`);
  const header = card.querySelector('.pdf-header');

  header.addEventListener('dragstart', e => {
    if (pageDragSrc) return; // don't interfere with page drag
    dragSrcCardIdx = idx;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', `card-${idx}`);
  });
  header.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom'));
    dragSrcCardIdx = null;
  });

  card.addEventListener('dragover', e => {
    if (dragSrcCardIdx === null || pageDragSrc) return;
    e.preventDefault();
    const rect = card.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    card.classList.toggle('drag-over-top', e.clientY < mid);
    card.classList.toggle('drag-over-bottom', e.clientY >= mid);
  });
  card.addEventListener('dragleave', () => {
    card.classList.remove('drag-over-top', 'drag-over-bottom');
  });
  card.addEventListener('drop', e => {
    if (dragSrcCardIdx === null || pageDragSrc) return;
    e.preventDefault();
    const targetIdx = idx;
    if (dragSrcCardIdx === targetIdx) return;
    const moved = state.pdfs.splice(dragSrcCardIdx, 1)[0];
    const rect = card.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    let insertIdx = e.clientY < mid ? targetIdx : targetIdx + 1;
    if (dragSrcCardIdx < targetIdx) insertIdx--;
    state.pdfs.splice(insertIdx < 0 ? 0 : insertIdx, 0, moved);
    renderAll();
  });
}

// === Actions ===
function toggleExpand(idx) {
  state.pdfs[idx].expanded = !state.pdfs[idx].expanded;
  renderAll();
}

function movePDF(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= state.pdfs.length) return;
  const tmp = state.pdfs[idx];
  state.pdfs[idx] = state.pdfs[newIdx];
  state.pdfs[newIdx] = tmp;
  renderAll();
}

function removePDF(idx) {
  state.pdfs.splice(idx, 1);
  renderAll();
  showToast('파일이 제거되었습니다');
}

function duplicatePDF(idx) {
  const src = state.pdfs[idx];
  state.pdfs.splice(idx + 1, 0, {
    ...src,
    id: Date.now() + Math.random(),
    name: duplicateName(src.name),
    selectedPages: new Set(src.selectedPages),
    pageOrder: [...src.pageOrder],
    expanded: false,
  });
  renderAll();
  showToast('파일이 복제되었습니다');
}

function selectAllInPDF(idx) {
  const pdf = state.pdfs[idx];
  pdf.pageOrder.forEach(p => pdf.selectedPages.add(p));
  renderAll();
}
function deselectAllInPDF(idx) {
  state.pdfs[idx].selectedPages.clear();
  renderAll();
}
function invertInPDF(idx) {
  const pdf = state.pdfs[idx];
  pdf.pageOrder.forEach(p => {
    if (pdf.selectedPages.has(p)) pdf.selectedPages.delete(p);
    else pdf.selectedPages.add(p);
  });
  renderAll();
}
function reversePageOrder(idx) {
  state.pdfs[idx].pageOrder.reverse();
  renderAll();
}

function applyRange(idx, rangeStr) {
  if (!rangeStr.trim()) return;
  const pdf = state.pdfs[idx];
  pdf.selectedPages.clear();
  const parts = rangeStr.split(',');
  for (const part of parts) {
    const trimmed = part.trim();
    const m = trimmed.match(/^(\d+)\s*-\s*(\d+)$/);
    if (m) {
      const from = parseInt(m[1]), to = parseInt(m[2]);
      for (let i = Math.min(from,to); i <= Math.max(from,to); i++) {
        if (i >= 1 && i <= pdf.pageCount) pdf.selectedPages.add(i);
      }
    } else {
      const n = parseInt(trimmed);
      if (n >= 1 && n <= pdf.pageCount) pdf.selectedPages.add(n);
    }
  }
  renderAll();
  showToast(`${pdf.selectedPages.size}개 페이지 선택됨`);
}

function selectAllPages() { state.pdfs.forEach((_, i) => selectAllInPDF(i)); }
function deselectAllPages() { state.pdfs.forEach((_, i) => deselectAllInPDF(i)); }
function invertSelection() { state.pdfs.forEach((_, i) => invertInPDF(i)); }
function selectOddPages() {
  state.pdfs.forEach(pdf => {
    pdf.selectedPages.clear();
    pdf.pageOrder.forEach((p, i) => { if ((i + 1) % 2 === 1) pdf.selectedPages.add(p); });
  });
  renderAll();
}
function selectEvenPages() {
  state.pdfs.forEach(pdf => {
    pdf.selectedPages.clear();
    pdf.pageOrder.forEach((p, i) => { if ((i + 1) % 2 === 0) pdf.selectedPages.add(p); });
  });
  renderAll();
}

function removeUnselected() {
  state.pdfs.forEach(pdf => {
    pdf.pageOrder = pdf.pageOrder.filter(p => pdf.selectedPages.has(p));
  });
  state.pdfs = state.pdfs.filter(pdf => pdf.pageOrder.length > 0);
  renderAll();
  showToast('미선택 페이지가 제거되었습니다');
}

function clearAll() {
  state.pdfs = [];
  renderAll();
}

// === Merge ===
async function mergePDFs() {
  const totalSelected = state.pdfs.reduce((s, p) => s + p.selectedPages.size, 0);
  if (!totalSelected) { showToast('선택된 페이지가 없습니다', '#f85149'); return; }

  const downloadName = await requestOutputFileName(getSuggestedOutputName());
  if (!downloadName) return;

  showOverlay('PDF 합치는 중...');
  try {
    const merged = await PDFLib.PDFDocument.create();
    let done = 0;

    for (const pdf of state.pdfs) {
      if (pdf.type === 'image') {
        if (!pdf.selectedPages.has(1)) continue;
        await addImagePage(merged, pdf);
        done++;
        setProgress((done / totalSelected) * 100);
        continue;
      }

      const srcDoc = await PDFLib.PDFDocument.load(pdf.data, { ignoreEncryption: true });
      for (const pageNum of pdf.pageOrder) {
        if (!pdf.selectedPages.has(pageNum)) continue;
        const [copied] = await merged.copyPages(srcDoc, [pageNum - 1]);
        merged.addPage(copied);
        done++;
        setProgress((done / totalSelected) * 100);
      }
    }

    const pdfBytes = await merged.save();
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = downloadName;
    a.click();
    URL.revokeObjectURL(url);

    hideOverlay();
    showToast(`✅ ${totalSelected}페이지 PDF가 생성되었습니다!`);
  } catch(err) {
    hideOverlay();
    showToast('오류: ' + err.message, '#f85149');
  }
}

// === Helpers ===
function isPDFFile(file) {
  return file.type === 'application/pdf' || /\.pdf$/i.test(file.name);
}

function isImageFile(file) {
  return file.type.startsWith('image/') || /\.(png|jpe?g|webp|gif|bmp)$/i.test(file.name);
}

function isSupportedFile(file) {
  return isPDFFile(file) || isImageFile(file);
}

async function addImagePage(merged, pdf) {
  const image = pdf.imageKind === 'jpg'
    ? await merged.embedJpg(pdf.imageData)
    : await merged.embedPng(pdf.imageData);
  const dims = image.scale(1);
  const pageWidth = dims.width > dims.height ? 841.89 : 595.28;
  const pageHeight = dims.width > dims.height ? 595.28 : 841.89;
  const margin = 36;
  const scale = Math.min((pageWidth - margin * 2) / dims.width, (pageHeight - margin * 2) / dims.height);
  const width = dims.width * scale;
  const height = dims.height * scale;
  const page = merged.addPage([pageWidth, pageHeight]);

  page.drawImage(image, {
    x: (pageWidth - width) / 2,
    y: (pageHeight - height) / 2,
    width,
    height,
  });
}

async function renderImageThumbnail(pdf, canvas) {
  const img = await loadImageElement(pdf.previewUrl);
  canvas.width = 300;
  canvas.height = 424;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const scale = Math.min(canvas.width / img.naturalWidth, canvas.height / img.naturalHeight);
  const width = img.naturalWidth * scale;
  const height = img.naturalHeight * scale;
  ctx.drawImage(img, (canvas.width - width) / 2, (canvas.height - height) / 2, width, height);
}

function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

async function loadImageInfo(src) {
  const img = await loadImageElement(src);
  return { width: img.naturalWidth, height: img.naturalHeight };
}

function loadImageElement(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('이미지를 읽을 수 없습니다'));
    img.src = src;
  });
}

async function convertImageToPngBytes(src) {
  const img = await loadImageElement(src);
  const canvas = document.createElement('canvas');
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0);
  return dataURLToUint8Array(canvas.toDataURL('image/png'));
}

function dataURLToUint8Array(dataUrl) {
  const base64 = dataUrl.split(',')[1];
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

function duplicateName(name) {
  const dot = name.lastIndexOf('.');
  if (dot <= 0) return `${name} (복사)`;
  return `${name.slice(0, dot)} (복사)${name.slice(dot)}`;
}

function makeOutputName(name) {
  const dot = name.lastIndexOf('.');
  if (dot <= 0) return `${name}_edited.pdf`;
  return `${name.slice(0, dot)}_edited.pdf`;
}

function getSuggestedOutputName() {
  if (state.pdfs.length === 1) return makeOutputName(state.pdfs[0].name);
  return 'merged_' + new Date().toISOString().slice(0,10) + '.pdf';
}

function normalizeOutputFileName(name, fallback) {
  const cleaned = (name || '').trim().replace(/[\\/:*?"<>|]+/g, '-');
  const base = cleaned || fallback || getSuggestedOutputName();
  return /\.pdf$/i.test(base) ? base : `${base}.pdf`;
}

function requestOutputFileName(defaultName) {
  const modal = document.getElementById('filenameModal');
  const input = document.getElementById('outputFileNameInput');
  input.value = defaultName;
  modal.classList.add('show');
  modal.setAttribute('aria-hidden', 'false');

  setTimeout(() => {
    input.focus();
    input.select();
  }, 0);

  return new Promise(resolve => {
    filenameResolver = value => {
      filenameResolver = null;
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden', 'true');
      resolve(value);
    };
  });
}

function confirmFileName() {
  if (!filenameResolver) return;
  const input = document.getElementById('outputFileNameInput');
  filenameResolver(normalizeOutputFileName(input.value, getSuggestedOutputName()));
}

function cancelFileName() {
  if (filenameResolver) filenameResolver(null);
}

function updateStatus() {
  const total = state.pdfs.reduce((s, p) => s + p.pageCount, 0);
  const selected = state.pdfs.reduce((s, p) => s + p.selectedPages.size, 0);
  document.getElementById('totalFiles').textContent = state.pdfs.length;
  document.getElementById('totalPages').textContent = total;
  document.getElementById('selectedPages').textContent = selected;
  document.getElementById('resultPages').textContent = selected;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showOverlay(text) {
  document.getElementById('overlayText').textContent = text;
  document.getElementById('overlay').classList.add('show');
  setProgress(0);
}
function hideOverlay() { document.getElementById('overlay').classList.remove('show'); }
function setProgress(pct) { document.getElementById('progressFill').style.width = pct + '%'; }

function showToast(msg, color = '#2ea043') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Prevent default drag on body
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  // If dropped on body (outside drop zone), still handle files
  if (!e.target.closest('.pdf-card') && !e.target.closest('#dropZone')) {
    const files = e.dataTransfer.files;
    if (files.length) handleFiles(files);
  }
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => {
      console.warn('Service worker registration failed:', err);
    });
  });
}
