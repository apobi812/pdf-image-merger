<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="툴킷">
<meta name="description" content="동영상에서 원하는 시점의 프레임을 이미지로 추출하는 무료 브라우저 도구입니다.">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; media-src 'self' blob: data:; worker-src 'self' blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; upgrade-insecure-requests">
<base href="../">
<link rel="canonical" href="https://apobi812.github.io/pdf-image-merger/video-extractor/">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="stylesheet" href="styles.css?v=20260629-fileguard">
<title>동영상 프레임 추출 - 툴킷</title>
</head>
<body>
<div class="app-shell">
  <aside class="left-rail" aria-label="도구 메뉴">
    <button class="brand brand-button" id="brandHome" type="button" aria-label="툴킷 홈">
      <div class="brand-mark">TK</div>
      <div>
        <div class="brand-name" data-i18n="brand">툴킷</div>
        <div class="brand-sub" data-i18n="brandSub">빠른 브라우저 도구</div>
      </div>
    </button>
    <nav class="tool-nav" id="toolNav">
      <button class="tool-link" data-route="pdf" type="button">
        <span class="tool-icon">PDF</span>
        <span data-i18n="pdfTool">PDF 관리</span>
      </button>
      <button class="tool-link" data-route="word-count" type="button">
        <span class="tool-icon">TXT</span>
        <span data-i18n="wordTool">글자수 세기</span>
      </button>
      <button class="tool-link" data-route="video-extractor" type="button">
        <span class="tool-icon">VID</span>
        <span data-i18n="videoTool">동영상 추출</span>
      </button>
    </nav>
    <div class="rail-ad" aria-label="광고 영역">
      <span data-i18n="adLabel">광고 영역</span>
      <small>AdSense slot</small>
    </div>
  </aside>

  <main class="main-area">
    <header class="top-bar">
      <section>
        <p class="eyebrow" id="toolEyebrow">Client-side tools</p>
        <h1 id="toolTitle">툴킷</h1>
        <p id="toolDescription">모든 파일 처리는 가능한 한 브라우저 안에서 실행됩니다.</p>
      </section>
      <div class="top-actions">
        <div class="language-picker" id="languagePicker" aria-label="언어 선택"></div>
      </div>
    </header>

    <section class="notice-band" id="noticeBand"></section>
    <section class="workspace" id="workspace" tabindex="-1"></section>

    <footer class="site-footer">
      <div class="footer-ad" aria-label="광고 영역">
        <span data-i18n="adLabel">광고 영역</span>
        <small>Horizontal AdSense slot</small>
      </div>
      <nav class="footer-links" aria-label="문서 링크">
        <button type="button" data-page="about" data-i18n="about">소개</button>
        <button type="button" data-page="privacy" data-i18n="privacy">개인정보처리방침</button>
        <button type="button" data-page="terms" data-i18n="terms">이용약관</button>
        <button type="button" data-page="security" data-i18n="security">보안</button>
      </nav>
      <p class="footer-copy">© Jihun Ryu · Toolkit runs locally in your browser.</p>
    </footer>
  </main>

  <aside class="right-rail" id="settingsPanel" aria-label="도구 설정"></aside>
</div>

<div class="modal" id="filenameModal" aria-hidden="true">
  <form class="dialog" id="filenameForm">
    <h2 data-i18n="saveAs">저장할 파일명</h2>
    <label for="outputFileNameInput" data-i18n="fileName">파일명</label>
    <input id="outputFileNameInput" class="input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false">
    <div class="dialog-actions">
      <button class="button ghost" type="button" id="cancelFileName" data-i18n="cancel">취소</button>
      <button class="button primary" type="submit" data-i18n="save">저장</button>
    </div>
  </form>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<noscript>
  <section class="noscript-panel">
    이 툴킷은 PDF 처리, 글자수 계산, 동영상 프레임 추출을 브라우저에서 실행하기 위해 JavaScript가 필요합니다.
  </section>
</noscript>

<script src="vendor/pdf.min.js"></script>
<script src="vendor/pdf-lib.min.js"></script>
<script src="config.js?v=20260629-fileguard"></script>
<script src="app.js?v=20260629-fileguard"></script>
</body>
</html>
